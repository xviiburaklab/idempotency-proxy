services:
  proxy:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      UPSTREAM_URL: ${UPSTREAM_URL:-http://mock-api:80}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://idem:idem@postgres:5432/idempotency
      TTL_SECONDS: 86400
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idem
      POSTGRES_PASSWORD: idem
      POSTGRES_DB: idempotency
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idem -d idempotency"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # lightweight echo server for local testing — replace with your real API
  mock-api:
    image: ealen/echo-server
    ports:
      - "4000:80"
    environment:
      PORT: 80

volumes:
  pg_data:
  redis_data:
